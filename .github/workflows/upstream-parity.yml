# Scheduled parity watchdog — three scenarios, each opens/updates a labelled `upstream-break`
# issue on failure (the per-push CI gate stays the blocking check; this is early-warning):
#
#   self            pinned tests + pinned package, vs the committed baseline. "Did WE break parity?"
#                   (or non-code drift). Runs on BOTH OSes — the per-push gate covers this too, but
#                   this catches drift between pushes / environment shifts.
#   latest-package  pinned tests + LATEST hypothesis package, vs the committed baseline. "Did a new
#                   hypothesis release change an internal our compatibility layer leans on?"
#   latest-tests    LATEST hypothesis tests + LATEST package, failures-only. "Do we still PASS the
#                   newest upstream test suite?" (the test ref is the latest package's version tag).
name: upstream-parity

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  parity:
    name: "${{ matrix.scenario }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, scenario: self, upgrade: "no", latest_tests: "no", mode: baseline }
          - { os: macos-latest, scenario: self, upgrade: "no", latest_tests: "no", mode: baseline }
          - { os: ubuntu-latest, scenario: latest-package, upgrade: "yes", latest_tests: "no", mode: baseline }
          - { os: ubuntu-latest, scenario: latest-tests, upgrade: "yes", latest_tests: "yes", mode: "failures-only" }
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run maturin develop --release
      - name: Select hypothesis version + fetch parity tests
        run: |
          if [ "${{ matrix.latest_tests }}" = "yes" ]; then
            # latest-tests: align the package AND tests at the newest GitHub release TAG. We use the
            # tag (not the PyPI version) because PyPI can be ahead of the tags — a tag derived from
            # the PyPI version may 404. The latest tag is guaranteed to have both a release and tests.
            TAG=$(git ls-remote --tags https://github.com/HypothesisWorks/hypothesis 'hypothesis-python-*' \
                  | sed -E 's#.*refs/tags/##' | grep -E '^hypothesis-python-[0-9.]+$' | sort -V | tail -1)
            VER="${TAG#hypothesis-python-}"
            echo "latest tagged hypothesis = $VER ($TAG)"
            uv pip install "hypothesis==$VER"
            export HF_UPSTREAM_REF="$TAG" HF_FETCH_TOLERANT=1
          elif [ "${{ matrix.upgrade }}" = "yes" ]; then
            # latest-package: newest PyPI release vs the PINNED tests.
            uv pip install --upgrade hypothesis
          fi
          bash tests/hypothesis_compat/fetch_upstream_tests.sh
      - name: Run parity + check
        id: parity
        env:
          PYTEST_ADDOPTS: "-p no:hypothesispytest -p no:cacheprovider -p pytester --timeout=120 --timeout-method=thread tests/hypothesis_compat"
        run: |
          set -o pipefail
          # Capture pytest-fast's own stdout — it inlines failure tracebacks (longrepr) for reds.
          uv run --no-sync pytest-fast --runs 1 --workers 2 --dump /tmp/outcomes.json 2>&1 | tee /tmp/run.log || true
          FLAG=""
          [ "${{ matrix.mode }}" = "failures-only" ] && FLAG="--failures-only"
          uv run --no-sync python tests/check_parity_outcomes.py /tmp/outcomes.json $FLAG 2>&1 | tee /tmp/parity.log
      # On divergence, assemble the *why*: the outcome diff, the collection/import errors behind
      # any dropped files (a plain --collect-only surfaces what the daemon tolerates), and the
      # failure tracebacks from the run. This is what makes the issue actionable, not a name list.
      - name: Assemble failure diagnostics
        if: failure()
        run: |
          {
            echo "#### What diverged (outcome diff vs the committed baseline)"
            echo '```'; cat /tmp/parity.log 2>/dev/null || echo "(no comparator output)"; echo '```'
            echo "#### Collection/import errors (why files dropped) — pytest --collect-only"
            echo '```'
            uv run --no-sync pytest -p no:hypothesispytest -p no:cacheprovider -p pytester \
              --collect-only -q tests/hypothesis_compat 2>&1 \
              | grep -aE "error|Error|cannot import|ModuleNotFound|while importing|^E " | head -40 || echo "(none)"
            echo '```'
            echo "#### Failure tracebacks (why tests changed -> failed) — from the run"
            echo '```'
            grep -a -A 16 -E "✗ " /tmp/run.log 2>/dev/null | head -160 || echo "(see run.log)"
            echo '```'
          } > /tmp/diag.md
      - name: Open / update an issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SCENARIO: ${{ matrix.scenario }}
          OSNAME: ${{ matrix.os }}
        with:
          script: |
            const fs = require('fs');
            // Guard: a non-empty comparator diff means it actually ran and found a divergence.
            // Empty => an infra/setup/fetch failure (the red run is the signal) — no empty issue.
            let diff = '';
            try { diff = fs.readFileSync('/tmp/parity.log', 'utf8'); } catch (e) {}
            if (!diff.trim()) {
              core.notice('No parity diff captured (infra/setup failure, not a parity divergence) — not opening an issue.');
              return;
            }
            let diag = '';
            try { diag = fs.readFileSync('/tmp/diag.md', 'utf8'); } catch (e) {}
            const sc = process.env.SCENARIO, osn = process.env.OSNAME;
            const intro = {
              'self': 'PINNED tests + PINNED package diverged from the committed baseline — WE may have broken parity, or non-code drift. The per-push CI gate should also be red; this catches drift between pushes.',
              'latest-package': 'The LATEST released hypothesis package broke our pinned parity tests — likely an upstream internals change our compatibility layer (errors/control/internal.conjecture/entropy) depends on.',
              'latest-tests': 'We FAIL one or more tests in the LATEST hypothesis test suite (latest tests + latest package).',
            }[sc] || 'Parity check failed.';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[parity] ${sc} on ${osn}`;
            const detail = diag.trim() || ['```', diff.trim(), '```'].join('\n');
            const body = [intro, '', `Run: ${runUrl}`, '', detail].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'upstream-break',
            });
            const found = open.data.find((i) => i.title === title);
            if (found) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: found.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['upstream-break'],
              });
            }
