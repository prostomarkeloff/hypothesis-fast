# Scheduled parity watchdog — three scenarios, each opens/updates a labelled `upstream-break`
# issue on failure (the per-push CI gate stays the blocking check; this is early-warning):
#
#   self            pinned tests + pinned package, vs the committed baseline. "Did WE break parity?"
#                   (or non-code drift). Runs on BOTH OSes — the per-push gate covers this too, but
#                   this catches drift between pushes / environment shifts.
#   latest-package  pinned tests + LATEST hypothesis package, vs the committed baseline. "Did a new
#                   hypothesis release change an internal our compatibility layer leans on?"
#   latest-tests    LATEST hypothesis tests + LATEST package, failures-only. "Do we still PASS the
#                   newest upstream test suite?" (the test ref is the latest package's version tag).
name: upstream-parity

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  parity:
    name: "${{ matrix.scenario }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, scenario: self, upgrade: "no", latest_tests: "no", mode: baseline }
          - { os: macos-latest, scenario: self, upgrade: "no", latest_tests: "no", mode: baseline }
          - { os: ubuntu-latest, scenario: latest-package, upgrade: "yes", latest_tests: "no", mode: baseline }
          - { os: ubuntu-latest, scenario: latest-tests, upgrade: "yes", latest_tests: "yes", mode: "failures-only" }
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run maturin develop --release
      - name: Upgrade to the latest released hypothesis
        if: matrix.upgrade == 'yes'
        run: uv pip install --upgrade hypothesis
      - name: Fetch parity tests (pinned ref, or the latest package's version tag)
        run: |
          if [ "${{ matrix.latest_tests }}" = "yes" ]; then
            V=$(uv run --no-sync python -c "import hypothesis; print(hypothesis.__version__)")
            export HF_UPSTREAM_REF="hypothesis-python-$V"
            echo "fetching latest tests @ $HF_UPSTREAM_REF"
          fi
          bash tests/hypothesis_compat/fetch_upstream_tests.sh
      - name: Run parity + check
        id: parity
        env:
          PYTEST_ADDOPTS: "-p no:hypothesispytest -p no:cacheprovider -p pytester --timeout=120 --timeout-method=thread tests/hypothesis_compat"
        run: |
          set -o pipefail
          uv run --no-sync pytest-fast --runs 1 --workers 2 --dump /tmp/outcomes.json || true
          FLAG=""
          [ "${{ matrix.mode }}" = "failures-only" ] && FLAG="--failures-only"
          uv run --no-sync python tests/check_parity_outcomes.py /tmp/outcomes.json $FLAG 2>&1 | tee /tmp/parity.log
      - name: Open / update an issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SCENARIO: ${{ matrix.scenario }}
          OSNAME: ${{ matrix.os }}
        with:
          script: |
            const fs = require('fs');
            let tail = '';
            try { tail = fs.readFileSync('/tmp/parity.log', 'utf8').split('\n').slice(-60).join('\n'); } catch (e) {}
            const sc = process.env.SCENARIO, osn = process.env.OSNAME;
            const intro = {
              'self': 'PINNED tests + PINNED package diverged from the committed baseline — WE may have broken parity, or non-code drift. The per-push CI gate should also be red; this catches drift between pushes.',
              'latest-package': 'The LATEST released hypothesis package broke our pinned parity tests — likely an upstream internals change our compatibility layer (errors/control/internal.conjecture/entropy) depends on.',
              'latest-tests': 'We FAIL one or more tests in the LATEST hypothesis test suite (latest tests + latest package).',
            }[sc] || 'Parity check failed.';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[parity] ${sc} on ${osn}`;
            const body = [intro, '', `Run: ${runUrl}`, '', '```', (tail.trim() || '(no log captured)'), '```'].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'upstream-break',
            });
            const found = open.data.find((i) => i.title === title);
            if (found) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: found.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['upstream-break'],
              });
            }
